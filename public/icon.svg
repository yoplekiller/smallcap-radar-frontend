<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1d4ed8" stroke-width="6" opacity="0.25"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1d4ed8" stroke-width="6" opacity="0.35"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#1d4ed8" stroke-width="6" opacity="0.5"/>
  <circle cx="256" cy="256" r="44"  fill="none" stroke="#3b82f6" stroke-width="7" opacity="0.8"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="36"  x2="256" y2="476" stroke="#1d4ed8" stroke-width="3" opacity="0.2"/>
  <line x1="36"  y1="256" x2="476" y2="256" stroke="#1d4ed8" stroke-width="3" opacity="0.2"/>

  <!-- Radar sweep (wedge) -->
  <path d="M256 256 L256 56 A200 200 0 0 1 422 348 Z"
        fill="#3b82f6" opacity="0.13"/>

  <!-- Blip dots -->
  <circle cx="340" cy="160" r="10" fill="#60a5fa" opacity="0.9"/>
  <circle cx="340" cy="160" r="18" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.45"/>

  <circle cx="180" cy="330" r="7"  fill="#60a5fa" opacity="0.65"/>
  <circle cx="310" cy="300" r="5"  fill="#93c5fd" opacity="0.55"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#3b82f6"/>

  <!-- Up arrow (stock up) at top-right -->
  <polyline points="388,128 406,108 424,128" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="406" y1="108" x2="406" y2="155" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
</svg>
